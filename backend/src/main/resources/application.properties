spring.application.name=cart-api
server.port=${PORT:8080}

# MongoDB — use MONGODB_URI env var in production (e.g. MongoDB Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cartdb}

# JWT — secret must be >= 32 characters for HS256
jwt.secret=${JWT_SECRET:ThisIsASecretKeyThatIs32CharsLong!!}
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# Frontend URL for CORS — set FRONTEND_URL env var in production
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.com.example=${LOG_LEVEL:DEBUG}
