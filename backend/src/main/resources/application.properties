spring.application.name=cart-api
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/cartdb

# JWT — secret must be >= 32 characters for HS256
jwt.secret=ThisIsASecretKeyThatIs32CharsLong!!
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# Frontend URL for CORS
app.frontend-url=http://localhost:3000

# Logging
logging.level.com.example=DEBUG
